# Override HTTPS — utiliser avec :
#   docker compose -f docker-compose.yml -f docker-compose.https.yml up --build
#
# Prérequis : générer les certificats d'abord :
#   bash scripts/gen-certs.sh 192.168.1.x

services:
  frontend:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./frontend/nginx.https.conf:/etc/nginx/conf.d/default.conf:ro
